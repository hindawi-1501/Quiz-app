<!DOCTYPE html>
<html>
<head>
<title>Quiz Application</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">

<h1>Quiz Application</h1>

<!-- Category Selection -->
<div id="category">
<h3>Select Quiz Type</h3>

<button onclick="startQuiz('general')">General Quiz</button>
<button onclick="startQuiz('subject')">Subject Quiz</button>

</div>

<!-- Quiz Section -->
<div id="quiz">

<div class="progress-container">
<div id="progress-bar"></div>
</div>

<h2 id="question"></h2>

<div id="options"></div>

<button onclick="nextQuestion()">Next</button>

</div>

</div>

<script src="script.js"></script>

</body>
</html>
